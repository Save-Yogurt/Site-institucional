<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro do lote</title>

    <link rel="stylesheet" href="css/cadastro-do-lote.css">
</head>

<header>
    <div id="div_logo">
        <p id="logo">Save Yogurt</p>
    </div>
    <div id="div_links">
        <a href="dashboard.html">
        <p>Dashboard</p>
        </a>
        <a href="cadastro-do-lote.html">
        <p>Cadastro de itens</p>
        </a>
    </div>
    <div id="div_botoes">
        <a href="index.html">
        <Button class="botoes">Sair</Button>
        </a>
    </div>
</header>


<body>
    <main>
    <div id="bloco_titulo">
        <div id="titulo">
            <img id="imagem_caixa" src="img/caixa_icone.png" alt="Ícone de Caixa">
            <h1>Cadastro de Lote</h1>
        </div>
        <p class="subtitulo">Preencha as informações do lote e dos pallets</p>
    </div>

    <div id="bloco_maior">

        <h3 class="titulo_secao">Informações do Lote</h3>
        
        <div class="grupo_input">
            <label>Número do Lote</label>
            <input type="text" id="id_numero_lote" placeholder="Ex: LT-2026-001">
        </div>

        <div class="inputs_lado_a_lado">
            <div class="grupo_input">
                <label>Data de Produção</label>
                <input type="date" id="id_data_producao">
            </div>
            <div class="grupo_input">
                <label>Data de Validade</label>
                <input type="date" id="id_data_validade">
            </div>
        </div>

        <br>

        <h3 class="titulo_secao">Informações dos Pallets</h3>

        <div class="inputs_lado_a_lado">
            <div class="grupo_input">
                <label>Peso (kg)</label>
                <input type="number" id="id_peso" placeholder="Ex: 500">
            </div>
            <div class="grupo_input">
                <label>Quantidade de Pallets</label>
                <input type="number" id="id_qtd_pallets" placeholder="Ex: 10">
            </div>
        </div>

        <button class="botao" onclick="Lote()">Salvar Lote</button>

    </div>
</main>

</body>
</html>
