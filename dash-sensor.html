<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dashboard Sensor</title>
    
    <!-- Link Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Afacad:ital,wght@0,400..700;1,400..700&family=Darker+Grotesque:wght@300..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    
    <!-- Link FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <link rel="stylesheet" href="css/dashboard.css">
    
</head>
<body>

 <body>

    <div class="sidebar">
        <div class="sidebar-content">
            <img src="img/ChatGPT_Image_Mar_23__2026__07_48_58_PM-removebg-preview.png">
            <h2>Save Yogurt Admin</h2>
            <a href="dash-geral.html">
                <div class="menu-item"> 
                    <i class="fa-solid fa-chart-bar" style="color: #00BCD4"></i> 
                    <span class="menu-text">Dashboard Geral</span>
                </div>
            </a>
            <a href="dash-sensor.html">
                <div class="menu-item-selected"> 
                    <i class="fa-solid fa-microchip" style="color: #00BCD4;"></i>  
                    <span class="menu-text">Sensores</span>
                </div>
            </a>
            <a href="dash-cad.html">
                <div class="menu-item"> 
                    <i class="fa-solid fa-boxes-stacked" style="color: #00BCD4;"></i>
                    <span class="menu-text">Cadastro de itens</span>
                </div>
            </a>
        </div>
        <div class="logout-section">
            <button type="button" class="logout-btn" onclick="window.location.href='index.html'">
                Sair do Sistema
            </button>
        </div>
    </div>

<div class="main">

    <div class="titulo-sensor">
        <h1>Dashboard Sensores</h1>
        <select id="input_sensor" name="sensor">
            <option value="1" selected>Sensor1</option>
            <option value="2">Sensor2</option>
            <option value="3">Sensor3</option>
            <option value="4">Sensor4</option>
            <option value="5">Sensor5</option>
            <option value="6">Sensor6</option>
            <option value="7">Sensor7</option>
            <option value="8">Sensor8</option>
            <option value="9">Sensor9</option>
            <option value="10">Sensor10</option>
            <option value="11">Sensor11</option>
            <option value="12">Sensor12</option>
            <option value="13">Sensor13</option>
            <option value="14">Sensor14</option>
            <option value="15">Sensor15</option>
            <option value="16">Sensor16</option>
            <option value="17">Sensor17</option>
        </select><br><br>
    </div>

    <div class="cards">
        <div class="card">
            <strong>Status atual</strong>
            <div>Temperatura Ideal</div>
        </div>
        <div class="card">
            <strong>Caixa tual</strong>
            <div>29825</div>
        </div>
        <div class="card">
            <strong>Lote atual</strong>
            <div>3473</div>
        </div>
        <div class="card">
            <strong>Média da temperatura hoje</strong>
            <div>3,8 C°</div>
        </div>
    </div>

    <div class="graficos">
<div class="graficos">
    <div class="grafico">
        <div class="titulo-sensor">
        <h3>Temperatura por hora</h3>
    </div>
        <canvas id="lineChart" style="height: 300px;width:400px;"></canvas>
    </div>

    <div class="grafico">
            <div class="titulo-sensor">
                <h3>Alertas últimos 12 meses</h3>
            </div>
            <canvas id="barChart" style="height: 300px;width:400px;"></canvas>
    </div>

</div>



<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const ctx1 = document.getElementById('lineChart');

new Chart(ctx1, {
    type: 'line',
    data: {
        labels: ["10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00"],
        datasets: [
            {
                label: "Temperatura (°C)",
                data: [3, 3.4, 3.4, 3.9, 3.4, 2.9, 3.4, 3.4],
                borderColor: "#006876",
                backgroundColor: "#006876",
                borderWidth: 2,
                tension: 0.3,
                fill: false,
                zIndex: 5 
            },
            {
                // ancora topo - alerta vermelho
                label: 'Crítico',
                data: [7, 7, 7, 7, 7, 7, 7, 7],
                fill: 'end', //preenche até o final
                backgroundColor: '#ff0000ba',
                pointRadius: 0,
                borderWidth: 0
            },
            {
                // ancora topo - alerta amarelo
                label: 'Alerta',
                data: [5, 5, 5, 5, 5, 5, 5, 5],
                fill: 1, //preenche até o começo do dataset 1
                backgroundColor: '#ff000089',
                pointRadius: 0,
                borderWidth: 0
            },
            {
                // ancora base - alerta amarelo
                data: [2, 2, 2, 2, 2, 2, 2, 2],
                fill: 4, //preenche até o começo do dataset 4
                backgroundColor: '#ff000089',
                pointRadius: 0,
                borderWidth: 0
            },
            {
                // ancora base - alerta vermelho
                data: [0, 0, 0, 0, 0, 0, 0, 0],
                fill: 'start', //preenche até o começo
                backgroundColor: '#ff0000ba',
                pointRadius: 0,
                borderWidth: 0
            },
        ]
    },
    options: {
        responsive: true,
        plugins: {
        legend: {
            labels: {
                filter: function(item) {
                    return item.text !== undefined && item.text !== "";
                }
            }
            
        }
    },
        scales: {
            y: {
                min: -2,
                max: 9
            }
        }
    }
});

const ctx2 = document.getElementById('barChart');

new Chart(ctx2, {
    type: 'bar',
    data: {
        labels: ["Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro", "Janeiro","Fevereiro","Março","Abril", "Maio"],
        datasets: [
            {
                label: "Alertas",
                data: [1, 0, 4, 0, 1, 3, 0, 3, 1, 1, 0, 2, 0, 0, 1, 2],
                backgroundColor: "#006876"
            }
        ]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                min: 0,
                max: 5,
                ticks: {
                    // Para os números ficarem inteiros e nao decimais tipo 3,5
                    stepSize: 1,
                    precision: 0
                },
            }
        }
    }
});
    
</script>


</body>
</html>
