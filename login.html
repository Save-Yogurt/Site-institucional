<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Yogurt - Acesso</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tela_login.css">
</head>
<body>

    <header>
        <div id="div_logo">
            <a href="#">
                <img src="img\ChatGPT_Image_Mar_23__2026__07_48_58_PM-removebg-preview.png" alt="Logo Save Yogurt">
                <span id="logo_titulo">SAVE <span style="color: #006876;">YOGURT</span></span>
            </a>
        </div>
        <div id="div_links">
            <a href="#">Início</a>
            <a href="#">Simulador</a>
            <a href="#">Contato</a>
        </div>
        <div id="div_botoes">
            <button class="botoes" onclick="window.location.href='index.html'">Voltar</button>
        </div>
    </header>

    <main class="container_principal">
        
        <div id="pagina_login" class="card_auth">
            <h1>Login</h1>
            <div class="inputs_grupo">
                <input type="text" id="email_usuario" placeholder="E-mail">
                <input type="password" id="senha_usuario" placeholder="Senha">
            </div>
            <button class="botao_acao" onclick="continuar()">Continuar</button>
            <div class="links_auxiliares">
                <button class="botao_link" onclick="esqueceu_senha()">Esqueceu a senha?</button>
                <button class="botao_link" onclick="cadastro()">Cadastrar-se</button>
            </div>
            <div id="resultado"></div>
        </div>

        <div id="pagina_redefinir" class="card_auth">
            <h1>Redefinir senha</h1>
            <div class="inputs_grupo">
                <input type="password" id="nova_senha" placeholder="Nova senha">
                <input type="password" id="confirmar_senha" placeholder="Confirmar nova senha">
            </div>
            <button class="botao_acao" onclick="redefinir()">Redefinir senha</button>
            <div id="exibir"></div>
        </div>

        <div id="pagina_cadastro" class="card_auth">
            <h1>Cadastre-se</h1>
            <div class="inputs_grupo">
                <input type="text" id="nome_completo" placeholder="Nome completo">
                <input type="text" id="email" placeholder="E-mail">
                <input type="password" id="senha_cadastro" placeholder="Senha">
                <input type="text" id="cnpj_usuario" placeholder="CNPJ" maxlength="18">
            </div>
            <button class="botao_acao" onclick="cadastro_realizado()">Finalizar Cadastro</button>
            <div id="exibir_cadastro"></div>
        </div>

    </main>

    <footer>
        <div class="footer_brand">
            <img src="img\ChatGPT_Image_Mar_23__2026__07_48_58_PM-removebg-preview.png" alt="Logo">
            <h2>Save Yogurt</h2>
            <p>© 2026 Save Yogurt. Todos os direitos reservados.</p>
        </div>
        <div class="footer_col">
            <span>PLATAFORMA</span>
            <a href="#">Como funciona</a>
            <a href="#">Segurança</a>
        </div>
        <div class="footer_col">
            <span>SUPORTE</span>
            <a href="#">Central de ajuda</a>
            <a href="#">Termos de uso</a>
        </div>
    </footer>

    <script src="script-login.js"></script>
</body>
</html>
