<!DOCTYPE html>
<link rel="icon" href="img\ChatGPT_Image_Mar_23__2026__07_48_58_PM-removebg-preview.png">
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/dashboard.css">
    
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- HEADER  -->
<header>
    <div id="div_logo">
        <a href="index.html">
        <img src="img/ChatGPT_Image_Mar_23__2026__07_48_58_PM-removebg-preview.png">
        <p id="logo_titulo">Save Yogurt</p>
        </a>
    </div>
    <div id="div_links">
        <a href="dashboard.html">
        <p>Dashboard</p>
        </a>
        <a href="cadastro-do-lote.html">
        <p>Cadastro de itens</p>
        </a>
    </div>
    <div id="div_botoes">
        <a href="index.html">
        <Button class="botoes">Sair</Button>
        </a>
    </div>
</header>

    <div class="main">

    <div class="titulo-sensor">
        <h1>Dashboard</h1>
    </div>

    <div class="cards">
        <div class="card">
            <strong>Temperatura média todos sensores</strong>
            <div>4°C</div>
        </div>
        <div class="card">
            <strong>Sensores funcionando</strong>
            <div>14</div>
        </div>
        <div class="card">
            <strong>Sensores em manutenção</strong>
            <div>2</div>
        </div>
        <div class="card alerta">
            <strong>Sensores em alerta</strong>
            <div>1</div>
        </div>
    </div>

    <div class="graficos">
<div class="graficos">
    <div class="grafico">
        <div class="titulo-sensor">
        <h3>Temperatura (hora)</h3>
        <select id="input_sensor" name="sensor">
            <option value="1" selected>Sensor 1</option>
            <option value="2">Sensor 2</option>
            <option value="3">Sensor 3</option>
            <option value="4">Sensor 4</option>
            <option value="5">Sensor 5</option>
            <option value="6">Sensor 6</option>
            <option value="7">Sensor 7</option>
            <option value="8">Sensor 8</option>
            <option value="9">Sensor 9</option>
            <option value="10">Sensor 10</option>
            <option value="11">Sensor 11</option>
            <option value="12">Sensor 12</option>
            <option value="13">Sensor 13</option>
            <option value="14">Sensor 14</option>
            <option value="15">Sensor 15</option>
            <option value="16">Sensor 16</option>
        </select><br><br>
    </div>
        <canvas id="lineChart" style="height: 300px;width:400px;"></canvas>
    </div>

    <div class="grafico">
            <div class="titulo-sensor">
                <h3>Alertas por sensor (mês)</h3>
            </div>
            <canvas id="barChart" style="height: 300px;width:400px;"></canvas>
    </div>

</div>

</body>

<script>
const ctx1 = document.getElementById('lineChart');

new Chart(ctx1, {
    type: 'line',
    data: {
        labels: ["10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00"],
        datasets: [
            {
                label: "Temperatura (°C)",
                data: [4, 4, 5, 4, 4, 3, 4, 4],
                borderColor: "#006876",
                backgroundColor: "#006876",
                borderWidth: 2,
                tension: 0.3,
                fill: false,
                zIndex: 5 
            },
            {
                // ancora topo - alerta vermelho
                label: 'Alerta Vermelho',
                data: [10, 10, 10, 10, 10, 10, 10, 10],
                fill: 'end', //preenche até o final
                backgroundColor: '#ff2a007a',
                pointRadius: 0,
                borderWidth: 0
            },
            {
                // ancora topo - alerta amarelo
                label: 'Alerta Amarelo',
                data: [5, 5, 5, 5, 5, 5, 5, 5],
                fill: 1, //preenche até o começo do dataset 1
                backgroundColor: '#fdfd038f',
                pointRadius: 0,
                borderWidth: 0
            },
            {
                // ancora base - alerta amarelo
                data: [2, 2, 2, 2, 2, 2, 2, 2],
                fill: 4, //preenche até o começo do dataset 4
                backgroundColor: '#fdfd038f',
                pointRadius: 0,
                borderWidth: 0
            },
            {
                // ancora base - alerta vermelho
                data: [0, 0, 0, 0, 0, 0, 0, 0],
                fill: 'start', //preenche até o começo
                backgroundColor: '#ff2a007a',
                pointRadius: 0,
                borderWidth: 0
            }
        ]
    },
    options: {
        responsive: true,
        plugins: {
        legend: {
            labels: {
                filter: function(item) {
                    return item.text !== undefined && item.text !== "";
                }
            }
        }
    },
        scales: {
            y: {
                min: -3,
                max: 13
            }
        }
    }
});

const ctx2 = document.getElementById('barChart');

new Chart(ctx2, {
    type: 'bar',
    data: {
        labels: ["Sensor1","Sensor2","Sensor3","Sensor4","Sensor5","Sensor6","Sensor7","Sensor8","Sensor9","Sensor10","Sensor11","Sensor12","Sensor13","Sensor14","Sensor15","Sensor16"],
        datasets: [
            {
                label: "Alertas",
                data: [1, 0, 4, 0, 1, 3, 0, 3, 1, 1, 0, 2, 0, 0, 1, 2],
                backgroundColor: "#df4242"
            }
        ]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                min: 0,
                max: 5
            }
        }
    }
});
    
</script>

</html>
