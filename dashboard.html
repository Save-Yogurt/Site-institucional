<!DOCTYPE html>
<link rel="icon" href="img\ChatGPT_Image_Mar_23__2026__07_48_58_PM-removebg-preview.png">
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/dashboard.css">
    
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- HEADER  -->
<header>
    <div id="div_logo">
        <a href="index.html">
        <img src="img/ChatGPT_Image_Mar_23__2026__07_48_58_PM-removebg-preview.png">
        <p id="logo_titulo">Save Yogurt</p>
        </a>
    </div>
    <div id="div_links">
        <a href="dashboard.html">
        <p>Dashboard</p>
        </a>
        <a href="cadastro-do-lote.html">
        <p>Cadastro de itens</p>
        </a>
    </div>
    <div id="div_botoes">
        <a href="index.html">
        <Button class="botoes">Sair</Button>
        </a>
    </div>
</header>

    <div class="main">

    <div class="titulo-sensor">
        <h1>Dashboard</h1>
    </div>

    <div class="cards">
        <div class="card">
            <strong>Temperatura média todos sensores</strong>
            <div>4°C</div>
        </div>
        <div class="card">
            <strong>Sensores funcionando</strong>
            <div>14</div>
        </div>
        <div class="card">
            <strong>Sensores em manutenção</strong>
            <div>2</div>
        </div>
        <div class="card alerta">
            <strong>Sensores em alerta</strong>
            <div>1</div>
        </div>
    </div>

    <div class="graficos">
<div class="graficos">
    <div class="grafico">
        <h3>Temperatura média todos os sensores (hora)</h3>
        <canvas id="lineChart" style="height: 300px;width:400px;"></canvas>
    </div>

    <div class="grafico">
        <h3>Alertas por sensor (mês)</h3>
        <canvas id="barChart" style="height: 300px;width:400px;"></canvas>
    </div>

</div>

</body>

<script>
const ctx1 = document.getElementById('lineChart');

new Chart(ctx1, {
    type: 'line',
    data: {
        labels: ["12:00", "13:00", "14:00", "15:00", "16:00", "17:00"],
        datasets: [
            {
                label: "Temperatura (°C)",
                data: [2, 4, 3, 6, 5, 4],
                borderColor: "#006876",
                backgroundColor: "#006876",
                borderWidth: 2,
                tension: 0.3,
                fill: false,
                zIndex: 5 // Linha fica na frente de tudo
            },
            {
                // ÂNCORA PARA O TOPO (Acima de 8)
                label: 'Alerta Superior',
                data: [8, 8, 8, 8, 8, 8], // Linha reta no 8
                fill: 'end', // Pinta do 8 até o FINAL (topo) do gráfico
                backgroundColor: 'rgba(255, 0, 0, 0.3)',
                pointRadius: 0,
                borderWidth: 0
            },
            {
                // ÂNCORA PARA A BASE (Abaixo de 0)
                label: 'Alerta Inferior',
                data: [0, 0, 0, 0, 0, 0], // Linha reta no 0
                fill: 'start', // Pinta do 0 até o INÍCIO (chão) do gráfico
                backgroundColor: 'rgba(255, 0, 0, 0.3)',
                pointRadius: 0,
                borderWidth: 0
            }
        ]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                min: -2,
                max: 10
            }
        }
    }
});

const ctx2 = document.getElementById('barChart');

new Chart(ctx2, {
    type: 'bar',
    data: {
        labels: ["Sensor1","Sensor2","Sensor3","Sensor4","Sensor5","Sensor6","Sensor7","Sensor8","Sensor9","Sensor10","Sensor11","Sensor12","Sensor13","Sensor14","Sensor15","Sensor16"],
        datasets: [
            {
                label: "Alertas",
                data: [1, 0, 4, 0, 1, 3, 0, 3, 1, 1, 0, 2, 0, 0, 1, 2],
                backgroundColor: "#df4242"
            }
        ]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                min: 0,
                max: 5
            }
        }
    }
});
    
</script>

</html>
