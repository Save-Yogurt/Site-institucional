<div class="main">

    <div class="titulo-sensor">
        <h1>Cadastro de Itens</h1>
    </div>

    <div class="container">

    <div id="bloco_maior">

        <h3 class="titulo_secao">Informações do Lote</h3>
        
        <div class="grupo_input">
            <label>Número do Lote</label>
            <input type="text" id="id_numero_lote" placeholder="Ex: LT-2026-001">
        </div>

        <div class="inputs_lado_a_lado">
            <div class="grupo_input">
                <label>Data de Produção</label>
                <input type="date" id="id_data_producao">
            </div>
            <div class="grupo_input">
                <label>Data de Validade</label>
                <input type="date" id="id_data_validade">
            </div>
        </div>

        <br>

        <h3 class="titulo_secao">Informações dos Pallets</h3>

        <div class="inputs_lado_a_lado">
            <div class="grupo_input">
                <label>Peso (kg)</label>
                <input type="number" id="id_peso" placeholder="Ex: 500">
            </div>
            <div class="grupo_input">
                <label>Quantidade de Pallets</label>
                <input type="number" id="id_qtd_pallets" placeholder="Ex: 10">
            </div>
        </div>
        <button class="botao" onclick="Lote()">Salvar Lote</button>

    </div>

    </div>
