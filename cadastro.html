<body>

    <header>
        <div id="div_logo">
            <a href="index.html">
                <img src="img/ChatGPT_Image_Mar_23__2026__07_48_58_PM-removebg-preview.png" alt="Logo">

        </div>
        <div id="div_links">
            <a href="index.html">

            </a>
        </div>
    </header>

    <main class="container_principal">
        <div id="pagina_cadastro" class="card_auth">
            <h1>Cadastre-se</h1>
            <div class="inputs_grupo">
                <input type="text" id="ipt_codigo_cadastro" placeholder="Código">
                <input type="text" id="ipt_cpf_cadastro" placeholder="CPF" maxlength="14">
                <input type="email" id="ipt_email_cadastro" placeholder="E-mail">
                <input type="password" id="ipt_senha_cadastro" placeholder="Senha">
                <input type="password" id="ipt_confirmar_senha_cadastro" placeholder="Confirmar Senha">
            </div>
            <button class="botao_acao" onclick="cadastro_realizado()">Finalizar Cadastro</button>
            <div id="div_resultado_cadastro"></div>
            </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer_brand">
        <img src="img/ChatGPT_Image_Mar_23__2026__07_48_58_PM-removebg-preview.png">

            <a href="#"><img src="img/terra-icon.png"></a>
            <a href="#"><img src="img/mail.png"></a>
        </div>
    </div>
